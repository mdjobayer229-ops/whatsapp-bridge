app = "whatsapp-bridge"
primary_region = "ams"

[build]
  builder = "heroku/buildpacks:20"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "auth_storage"
  destination = "/data"

[env]
  NODE_VERSION = "20"
  AUTH_DIR = "/data/auth_info"
  WP_API_URL = "https://jobayergroup.com/wp-json/ai-router/v1/webhook"
  WHATSAPP_PHONE = "880130585531"
